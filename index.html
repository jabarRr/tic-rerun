<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <form name="playerInfoForm" class="playerInfoForm">
        <label for="player1-Name">Player 1: </label>
        <input type="text" id="player1-Name" name="player1-Name">
        <label for="player2-Name">Player 2: </label>
        <input type="text" id="player2-Name" name="player2-Name">
        <input class="submitBtn" type="submit" value="submit">
    </form>
    <div class="grid">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>
    <div class="lowerSection">
        <div class="resultSection"></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
